# WxPowerBot 配置模板
# 复制为 config.json 放到数据目录的 state/ 下
# 或通过环境变量 WXPOWERBOT_<KEY> 设置

# 管理员昵称（逗号分隔）
admin_users: ""

# 允许的群组（逗号分隔群名或ID，留空表示所有群）
allowed_groups: ""

# 允许的用户（逗号分隔昵称）
allowed_users: ""

# 是否响应私聊
respond_to_dms: false

# QR 码 HTTP 服务
qr_http: true
qr_port: 8646

# 盘搜 API
pansou_api: "http://192.168.10.216:850/api/search"

# CFTC 图床配置
cftc_url: "https://cftc.lliic.com"
cftc_username: ""
cftc_password: ""

# TG 转发配置 - 通过 state/tg_fwd/config.json 配置
# 格式:
# {
#   "bot_token": "xxx",
#   "forward_rules": [{"tg_channel": "@channel", "wechat_groups": ["@@groupid"]}]
# }

# LSPosed 模块更新配置 - 通过 state/lsposed/config.json 配置
# 格式:
# {
#   "enabled": true,
#   "target_groups": ["@@groupid"],
#   "github_token": "",
#   "custom_repos": []
# }
